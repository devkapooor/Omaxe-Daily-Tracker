<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#101312" />
    <title>AlphaHub</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", system-ui, sans-serif;
        background: #fcfbf4;
        color: #101312;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(43, 179, 94, 0.16), transparent 35%),
          #fcfbf4;
      }

      main {
        width: min(92vw, 34rem);
        border: 1px solid #d9ddd7;
        border-radius: 32px;
        padding: 32px 28px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 20px 60px rgba(24, 32, 27, 0.12);
      }

      .eyebrow {
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: #607168;
      }

      h1 {
        margin: 12px 0 10px;
        font-size: 30px;
        line-height: 1.1;
      }

      p {
        margin: 0;
        font-size: 15px;
        line-height: 1.7;
        color: #4f5d56;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="eyebrow">Offline</div>
      <h1>Internet required</h1>
      <p>AlphaHub uses live Firebase login and shared business data. Reconnect to the internet and reopen the workspace.</p>
    </main>
  </body>
</html>
